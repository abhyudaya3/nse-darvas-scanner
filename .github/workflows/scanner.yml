name: NSE Darvas Box Scanner

on:
  schedule:
    # Run Mon–Fri at 16:30 IST (11:00 UTC) – 30 min after NSE close
    - cron: '0 11 * * 1-5'
  workflow_dispatch:
    inputs:
      full_refresh:
        description: 'Force full history re-download'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']
      refresh_universe:
        description: 'Refresh NSE symbol list'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']
      no_telegram:
        description: 'Skip Telegram notification'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 240

    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
      ACCOUNT_SIZE:       ${{ vars.ACCOUNT_SIZE || '1000000' }}
      RISK_PCT:           ${{ vars.RISK_PCT || '1.0' }}

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Restore data cache ─────────────────────────────────────────────────
      - name: Restore price data cache
        uses: actions/cache@v4
        with:
          path: |
            data/daily
            data/nse_symbols.json
          key: nse-daily-${{ runner.os }}-${{ hashFiles('data/nse_symbols.json') }}
          restore-keys: |
            nse-daily-${{ runner.os }}-

      # ── 3. Restore SQLite database ────────────────────────────────────────────
      - name: Restore database artifacts
        uses: actions/cache@v4
        with:
          path: |
            data/signals.db
            data/watchlist.db
            data/telegram_sent.json
          key: nse-db-${{ runner.os }}-${{ github.run_number }}
          restore-keys: |
            nse-db-${{ runner.os }}-

      # ── 4. Python setup ───────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # ── 5. Run scanner ────────────────────────────────────────────────────────
      - name: Run Darvas Box Scanner
        run: |
          ARGS=""
          [ "${{ github.event.inputs.full_refresh }}"     = "true" ] && ARGS="$ARGS --full-refresh"
          [ "${{ github.event.inputs.refresh_universe }}" = "true" ] && ARGS="$ARGS --refresh-universe"
          [ "${{ github.event.inputs.no_telegram }}"      = "true" ] && ARGS="$ARGS --no-telegram"
          python main.py $ARGS

      # ── 6. Upload reports artifact ────────────────────────────────────────────
      - name: Upload Excel report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: darvas-report-${{ github.run_number }}
          path: reports/
          retention-days: 90

      # ── 7. Upload logs artifact ───────────────────────────────────────────────
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: darvas-logs-${{ github.run_number }}
          path: logs/
          retention-days: 30

      # ── 8. Save updated DB back to cache ─────────────────────────────────────
      - name: Save database cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            data/signals.db
            data/watchlist.db
            data/telegram_sent.json
          key: nse-db-${{ runner.os }}-${{ github.run_number }}

      # ── 9. Save updated price cache ───────────────────────────────────────────
      - name: Save price data cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            data/daily
            data/nse_symbols.json
          key: nse-daily-${{ runner.os }}-${{ hashFiles('data/nse_symbols.json') }}
