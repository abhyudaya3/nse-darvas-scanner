name: NSE Darvas Box Scanner

on:
  schedule:
    # Mon–Fri at 11:05 UTC = 4:35 PM IST (market closes 3:30 PM IST)
    - cron: '5 11 * * 1-5'
  workflow_dispatch:
    inputs:
      full_refresh:
        description: 'Force full history re-download'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']
      refresh_universe:
        description: 'Refresh NSE symbol list'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']
      no_telegram:
        description: 'Skip Telegram notification'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']
      debug_symbol:
        description: 'Debug single symbol (e.g. RELIANCE) — skips full scan'
        required: false
        default: ''

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 240

    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
      ACCOUNT_SIZE:       ${{ vars.ACCOUNT_SIZE || '1000000' }}
      RISK_PCT:           ${{ vars.RISK_PCT || '1.0' }}

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python setup ───────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # ── 3. Restore Parquet price cache ────────────────────────────────────────
      #    Key includes date so stale caches auto-expire after 7 days
      - name: Restore price data cache
        uses: actions/cache/restore@v4
        id: cache-price
        with:
          path: data/daily
          key: nse-daily-${{ runner.os }}-${{ hashFiles('data/nse_symbols.json') }}-${{ github.run_number }}
          restore-keys: |
            nse-daily-${{ runner.os }}-

      # ── 4. Restore database ───────────────────────────────────────────────────
      - name: Restore database
        uses: actions/cache/restore@v4
        id: cache-db
        with:
          path: |
            data/signals.db
            data/watchlist.db
            data/nse_symbols.json
            data/telegram_sent.json
          key: nse-db-${{ runner.os }}-${{ github.run_number }}
          restore-keys: |
            nse-db-${{ runner.os }}-

      # ── 5a. Debug mode (single symbol) ───────────────────────────────────────
      - name: Debug single symbol
        if: ${{ github.event.inputs.debug_symbol != '' }}
        run: |
          python main.py --debug-symbol "${{ github.event.inputs.debug_symbol }}"

      # ── 5b. Full scan ─────────────────────────────────────────────────────────
      - name: Run Darvas Box Scanner
        if: ${{ github.event.inputs.debug_symbol == '' }}
        run: |
          ARGS=""
          [ "${{ github.event.inputs.full_refresh }}"     = "true" ] && ARGS="$ARGS --full-refresh"
          [ "${{ github.event.inputs.refresh_universe }}" = "true" ] && ARGS="$ARGS --refresh-universe"
          [ "${{ github.event.inputs.no_telegram }}"      = "true" ] && ARGS="$ARGS --no-telegram"
          python main.py $ARGS

      # ── 6. Upload Excel report ────────────────────────────────────────────────
      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: darvas-report-${{ github.run_number }}
          path: reports/
          retention-days: 90

      # ── 7. Upload logs ────────────────────────────────────────────────────────
      - name: Upload logs artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: darvas-logs-${{ github.run_number }}
          path: logs/
          retention-days: 30

      # ── 8. Save price cache ───────────────────────────────────────────────────
      - name: Save price data cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/daily
          key: nse-daily-${{ runner.os }}-${{ hashFiles('data/nse_symbols.json') }}-${{ github.run_number }}

      # ── 9. Save database ──────────────────────────────────────────────────────
      - name: Save database cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            data/signals.db
            data/watchlist.db
            data/nse_symbols.json
            data/telegram_sent.json
          key: nse-db-${{ runner.os }}-${{ github.run_number }}
